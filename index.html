<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Climate Champion Quiz</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- Start Screen -->
  <div id="start-screen" class="screen">
    <h1>🌍 Climate Champion</h1>
    <p>Which role will you become in a changing Philippines?</p>
    <button onclick="startQuiz()">Start</button>
  </div>

  <!-- Chapter Screen (ACT 1) -->
  <div id="chapter-screen" class="screen hidden">
    <h2 id="chapter-title">Act 1</h2>
    <p id="chapter-desc">Loading story...</p>
    <p style="opacity:0.7;">Tap anywhere to continue</p>
  </div>

  <!-- Quiz Box -->
  <div id="quiz-box" class="screen hidden">

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <p id="progress-text"></p>

    <h1 id="question"></h1>

    <div id="answers"></div>

    <button id="next-btn" onclick="nextQuestion()">Next</button>

  </div>

  <!-- Result -->
  <div id="result-box" class="screen hidden">
    <h1 id="result-title"></h1>
    <p id="result-desc"></p>

    <button onclick="restartQuiz()">Restart</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
