<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Climate Champion Quiz</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&family=Instrument+Serif:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'DM Sans', sans-serif; }
    h1, h2, .arc-title { font-family: 'Fraunces', serif; }
    #q-text { font-family: 'Instrument Serif', serif; font-size: 1.5rem; font-weight: 600; }
    .choice-btn { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.15); }
    .choice-btn:hover { transform: translateY(-2px); box-shadow: 0 0 20px rgba(16,185,129,0.3); }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  </style>

</head>

<body class="min-h-screen flex items-center justify-center p-4" style="background:#020818;">

<!-- START SCREEN -->
<div id="start-screen" class="text-center max-w-lg mx-auto">
  <h1 class="text-4xl text-white mb-6">What Climate Force Are You?</h1>

  <button class="px-8 py-3 rounded-full bg-emerald-500 text-white font-bold"
    onclick="startQuiz()">
    TAKE THE QUIZ
  </button>
</div>

<!-- RESULTS SCREEN -->
<div id="results-screen" class="hidden text-center max-w-lg mx-auto">
  <h1 id="result-title" class="text-white text-4xl mb-4"></h1>
  <p id="result-desc" class="text-white opacity-80 mb-6"></p>

  <button onclick="downloadResult()" class="bg-emerald-500 text-white px-6 py-2 rounded-full">
    Download
  </button>
</div>

<script>
const types = ['Canopy','Ember','Tide','Echo','Summit'];
const scores = {Canopy:0,Ember:0,Tide:0,Echo:0,Summit:0};

let currentQ = 0;

function show(id) {
  ['start-screen','results-screen'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

/* ✅ THIS NOW WORKS */
function startQuiz() {
  currentQ = 0;
  types.forEach(t => scores[t] = 0);
  show('results-screen'); // (placeholder flow)
}

/* =========================
   FIXED DOWNLOAD FUNCTION
========================= */
function downloadResult() {
  const winner = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];

  const canvas = document.createElement('canvas');
  const width = 800, height = 1000;
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  const img = new Image();
  img.crossOrigin = "anonymous";

  // fallback image so it never breaks
  img.src = "https://images.pexels.com/photos/33235130/pexels-photo-33235130.jpeg";

  img.onload = () => {

    const gradient = ctx.createLinearGradient(0, 0, width, height);
    gradient.addColorStop(0, '#0f1729');
    gradient.addColorStop(1, '#064e3b');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 40px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("Climate Force Result", width/2, 120);

    const link = document.createElement('a');
    link.download = "climate-force.png";
    link.href = canvas.toDataURL();
    link.click();
  };
}

/* =========================
   FIXED HELPER (GLOBAL SCOPE)
========================= */
function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';

  for (let w of words) {
    const test = line + ' ' + w;
    if (ctx.measureText(test).width > maxWidth) {
      lines.push(line);
      line = w;
    } else {
      line = test;
    }
  }
  lines.push(line);
  return lines;
}
</script>

</body>
</html>
